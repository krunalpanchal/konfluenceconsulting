<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06111F"/><stop offset="55%" stop-color="#081B31"/><stop offset="100%" stop-color="#030914"/></linearGradient><linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6EE7FF"/><stop offset="100%" stop-color="#1BA6FF"/></linearGradient><linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0C1D33" stop-opacity="0.96"/><stop offset="100%" stop-color="#0A1526" stop-opacity="0.90"/></linearGradient><filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.title{font:700 50px Inter,Arial,sans-serif;fill:#F5FBFF}.subtitle{font:400 22px Inter,Arial,sans-serif;fill:#B4C8DC}.small{font:600 18px Inter,Arial,sans-serif;fill:#CFE6FF;letter-spacing:1px}.label{font:700 22px Inter,Arial,sans-serif;fill:#F5FBFF}.body{font:500 17px Inter,Arial,sans-serif;fill:#BBD0E6}.body2{font:500 15px Inter,Arial,sans-serif;fill:#BBD0E6}.metric{font:800 68px Inter,Arial,sans-serif;fill:#6EE7FF}.metricLabel{font:700 26px Inter,Arial,sans-serif;fill:#F5FBFF}.flow{stroke:url(#cyan);stroke-width:4;fill:none;stroke-linecap:round;filter:url(#softGlow);stroke-dasharray:10 16;animation:dash 7s linear infinite}@keyframes dash{to{stroke-dashoffset:-260}}</style></defs><rect width="1600" height="1000" fill="url(#bg)"/><circle cx="1300" cy="180" r="240" fill="#1BA6FF" fill-opacity="0.07"/><circle cx="250" cy="820" r="220" fill="#6EE7FF" fill-opacity="0.06"/><text x="80" y="160" class="title">Resume Intelligence Engine</text><text x="80" y="198" class="subtitle">Consulting platform powered by Python intelligence engines</text><rect x="80" y="250" rx="22" width="300" height="470" fill="url(#card)" stroke="#4EBEFF" stroke-opacity="0.22"/><text x="152" y="250" clas